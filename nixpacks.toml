providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-9_x", "python3", "gcc", "gnumake", "openssl"]
nixLibs = ["libuuid", "libGL"]

[phases.install]
cmds = ["pnpm i --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "pnpm drizzle-kit migrate && node .output/server/index.mjs"
